    let currentLang = 'es';
    let currentLayer = 'islands';

    function renderUI() {
      const t = ui[currentLang];
      document.documentElement.lang = t.lang;
      document.title = t.title;
      document.querySelector('meta[name="description"]').setAttribute('content', t.subtitle);
      document.querySelector('meta[property="og:title"]').setAttribute('content', t.title);
      document.querySelector('meta[property="og:description"]').setAttribute('content', t.subtitle);

      document.getElementById('page-title').textContent = t.title;
      document.getElementById('page-subtitle').textContent = t.subtitle;
      document.getElementById('intro-kicker').textContent = t.introKicker;
      document.getElementById('intro-text').textContent = t.introText;
      document.getElementById('reading-title').textContent = t.readingTitle;
      document.getElementById('reading-card-1-title').textContent = t.reading1Title;
      document.getElementById('reading-card-1-text').textContent = t.reading1Text;
      document.getElementById('reading-card-2-title').textContent = t.reading2Title;
      document.getElementById('reading-card-2-text').textContent = t.reading2Text;
      document.getElementById('reading-card-3-title').textContent = t.reading3Title;
      document.getElementById('reading-card-3-text').textContent = t.reading3Text;
      document.getElementById('legend-title').textContent = t.legendTitle;
      document.getElementById('note-strong').textContent = t.noteStrong;
      document.getElementById('note-text').textContent = t.noteText;
      document.getElementById('footer-note').textContent = t.footer;
      document.getElementById('bibliography-kicker').textContent = t.bibliographyKicker;
      document.getElementById('bibliography-title').textContent = t.bibliographyTitle;
      document.getElementById('bibliography-intro').textContent = t.bibliographyIntro;
      document.getElementById('bibliography-list').innerHTML = t.bibliographyItems.map(item => `<li class="bibliography-item">${item}</li>`).join('');

      document.getElementById('svg-ocean-label').textContent = t.svg.ocean;
      document.getElementById('svg-archipelago-label').textContent = t.svg.archipelago;
      document.getElementById('svg-islands-label').textContent = t.svg.islands;
      document.getElementById('svg-territories-label').textContent = t.svg.territories;
      document.getElementById('svg-inhabitants-label').textContent = t.svg.inhabitants;
      document.getElementById('svg-guardians-label').textContent = t.svg.guardians;
      document.getElementById('svg-bridges-label').textContent = t.svg.bridges;
      document.getElementById('svg-interactions-label-1').textContent = t.svg.interactions1;
      document.getElementById('svg-interactions-label-2').textContent = t.svg.interactions2;
      document.getElementById('diagram-svg').setAttribute('aria-label', currentLang === 'es' ? 'Diagrama estratificado del Archipiélago Wikimedia' : 'Stratified diagram of the Wikimedia Archipelago');

      renderLegend();
      updateLanguageButtons();
      showDetail(currentLayer);
    }

    function renderLegend() {
      const legendControls = document.getElementById('legend-controls');
      legendControls.innerHTML = Object.entries(layers).map(([key, layer]) => {
        const data = layer[currentLang];
        return `
          <div class="layer-control ${key === currentLayer ? 'active' : ''}" data-layer="${key}" onclick="toggleLayer('${key}')">
            <div class="layer-header">
              <div class="layer-icon" style="background:${layer.color};">${layer.icon}</div>
              <div class="layer-info">
                <div class="layer-name">${data.name}</div>
                <div class="layer-desc">${data.desc}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateLanguageButtons() {
      document.getElementById('btn-es').classList.toggle('active', currentLang === 'es');
      document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
    }

    function setLanguage(lang) {
      currentLang = lang;
      renderUI();
    }

    function toggleLayer(layerName) {
      currentLayer = layerName;

      document.querySelectorAll('.layer-control').forEach(el => el.classList.remove('active'));
      const activeControl = document.querySelector(`[data-layer="${layerName}"]`);
      if (activeControl) activeControl.classList.add('active');

      document.querySelectorAll('.layer-ring').forEach(el => {
        el.classList.remove('active');
        el.classList.add('dimmed');
      });

      const visualLayer = document.getElementById(`layer-${layerName}-visual`);
      if (visualLayer) {
        visualLayer.classList.remove('dimmed');
        visualLayer.classList.add('active');
      }

      showDetail(layerName);
    }

    function showDetail(layerName) {
      const data = layers[layerName][currentLang];
      if (!data) return;

      document.getElementById('detail-title').innerHTML = data.title;
      document.getElementById('detail-summary').innerHTML = data.summary;
      document.getElementById('detail-content').innerHTML = data.items.map(item => `
        <article class="detail-item">
          <div class="detail-item-title">${item.title}</div>
          <p class="detail-item-text">${item.text}</p>
          <div>${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
        </article>
      `).join('');
    }

    window.onload = () => {
      renderUI();
      toggleLayer(currentLayer);
    };
  </script>
